<!DOCTYPE html>
<html>
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="EVE">
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{width:100%;height:100%;border:none;position:fixed;top:0;left:0;right:0;bottom:0}
.touch-zone{position:fixed;top:0;left:0;width:100%;height:50px;z-index:9999;background:transparent}
</style>
</head>
<body>
<div class="touch-zone" ontouchstart="this.style.display='none';setTimeout(()=>{this.style.display=''},300)"></div>
<iframe src="eve.html" allowfullscreen></iframe>
</body>
</html>
