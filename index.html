<!DOCTYPE html>
<html>
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-title" content="EVE">
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
iframe{width:100%;height:100%;border:none;position:fixed;top:0;left:0;right:0;bottom:0}
</style>
</head>
<body>
<iframe id="eve" src="eve.html" allowfullscreen></iframe>
<script>
document.getElementById('eve').addEventListener('load',function(){
try{
var s=this.contentDocument.createElement('style');
s.textContent='#phone-screen .chat-header,#phone-screen .top-bar,.chat-page-header{margin-top:47px!important}#phone-screen .home-page .top-area{padding-top:47px!important}';
this.contentDocument.head.appendChild(s);
}catch(e){}
});
</script>
</body>
</html>
